name: Docker

# Note: tag builds go through .github/workflows/release.yml (which calls
# the same reusable with sign: true + attest: true). This workflow
# handles non-release container builds only.
on:
  schedule:
    - cron: "0 0 * * 0"
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: netresearch/.github/.github/workflows/build-container.yml@4f6d149347c61a27ce243f5ac8011d6748487341 # main
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    with:
      image-name: ldap-selfservice-password-changer
