name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Sundays at 00:00 UTC
    - cron: "0 0 * * 0"

permissions: {}

jobs:
  analyze:
    uses: netresearch/.github/.github/workflows/codeql.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      languages: go,javascript-typescript
