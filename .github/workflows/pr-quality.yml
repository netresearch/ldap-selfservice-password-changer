name: PR Quality Gates

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

jobs:
  quality:
    uses: netresearch/.github/.github/workflows/pr-quality.yml@main
    with:
      auto-approve-maintainers: true
    permissions:
      contents: read
      pull-requests: write
