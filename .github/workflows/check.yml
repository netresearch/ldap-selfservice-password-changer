name: Check

on:
  release:
    types: [published]
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go
    uses: netresearch/.github/.github/workflows/go-check.yml@4f6d149347c61a27ce243f5ac8011d6748487341 # main
    with:
      go-version-file: go.mod
      setup-bun: true
      pre-build-cmd: "bun install --frozen-lockfile && bun run build:assets"
      enable-codecov: true
      codecov-flags: "backend,unittests"
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    permissions:
      contents: read
      security-events: write

  ts:
    name: TypeScript
    uses: netresearch/.github/.github/workflows/ts-check.yml@4f6d149347c61a27ce243f5ac8011d6748487341 # main
    permissions:
      contents: read

  integration-test:
    name: Run integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      openldap:
        image: osixia/openldap:1.5.0
        ports:
          - 1389:389
        env:
          LDAP_ORGANISATION: Example Inc
          LDAP_DOMAIN: example.com
          LDAP_ADMIN_PASSWORD: adminpassword
        options: >-
          --health-cmd "ldapsearch -x -H ldap://localhost:389 -b 'dc=example,dc=com' -D 'cn=admin,dc=example,dc=com' -w adminpassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile && go mod download

      - name: Build assets
        run: bun run build:assets

      - name: Run integration tests with coverage
        env:
          LDAP_SERVER: ldap://localhost:1389
          LDAP_BASE_DN: dc=example,dc=com
          LDAP_READONLY_USER: cn=admin,dc=example,dc=com
          LDAP_READONLY_PASSWORD: adminpassword
          SMTP_HOST: localhost
          SMTP_PORT: "1025"
        run: go test -v -race -tags=integration -coverprofile=coverage-integration.out -covermode=atomic ./...

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-integration.out
          flags: backend,integration
          name: go-integration-coverage
          fail_ci_if_error: false

  e2e-test:
    name: Run E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile && go mod download

      - name: Build assets
        run: bun run build:assets

      - name: Run E2E tests with coverage
        run: go test -v -race -tags=e2e -coverprofile=coverage-e2e.out -covermode=atomic ./e2e/...

      - name: Upload E2E coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-e2e.out
          flags: backend,e2e
          name: go-e2e-coverage
          fail_ci_if_error: false

  fuzz-test:
    name: Fuzz tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fuzz tests (quick)
        run: |
          go test -run=^$ -fuzz=FuzzValidateNewPassword -fuzztime=10s ./internal/rpchandler/...
          go test -run=^$ -fuzz=FuzzPluralize -fuzztime=10s ./internal/rpchandler/...
          go test -run=^$ -fuzz=FuzzValidateEmailAddress -fuzztime=10s ./internal/email/...
